<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Музыкальный шпион</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="wrap">
    <h1>Музыкальный шпион — MVP</h1>

    <div id="authCard" class="card">
      <h2>Вход</h2>
      <input id="nameInput" placeholder="Твой ник" />
      <div>
        <button onclick="createRoom()">Создать комнату</button>
      </div>
      <div class="join-row">
        <input id="roomCodeInput" placeholder="Код комнаты" />
        <button class="secondary" onclick="joinRoom()">Войти в комнату</button>
      </div>
      <div id="createdRoomWrap" class="hidden top-gap">
        <div class="muted">Комната создана. Код лобби:</div>
        <div id="createdRoomCode" class="room-code-box"></div>
      </div>
      <div id="authMsg" class="muted"></div>
      <div id="debugMsg" class="danger top-gap"></div>
    </div>

    <div id="gameUI" class="hidden">
      <div class="card">
        <h2>Комната <span id="roomCodeLabel"></span></h2>
        <div class="pill">Ты: <span id="youLabel"></span></div>
        <div class="pill">Хост: <span id="hostLabel"></span></div>
        <div class="pill">Раунд: <span id="roundLabel"></span></div>
        <div class="pill">Фаза: <span id="phaseLabel"></span></div>
        <p id="statusText" class="muted"></p>
        <button id="startBtn" onclick="startGame()">Старт раунда</button>
        <button class="secondary" onclick="nextRound()">Следующий раунд</button>
      </div>

      <div class="grid">
        <div class="card">
          <h3>Твоя роль</h3>
          <div id="roleInfo">Пока нет активного раунда.</div>
        </div>

        <div class="card">
          <h3>Игроки и счёт</h3>
          <div id="playersList"></div>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h3>Отправка видео</h3>
          <input id="videoUrlInput" placeholder="YouTube ссылка" />
          <input id="timecodeInput" placeholder="Таймкод: 83 или 1:23 или 1m23s" />
          <div>
            <button onclick="submitVideo()">Отправить видео</button>
          </div>
          <div id="submitMsg" class="muted"></div>
        </div>

        <div class="card">
          <h3>Статус голосования</h3>
          <div id="voteStatusList" class="muted">Сейчас голосования нет.</div>
        </div>
      </div>

      <div class="card">
        <h3>Сейчас воспроизводится</h3>
        <div id="playInfo" class="muted">Пока ничего не играет.</div>
        <div id="playerBox"></div>
      </div>

      <div class="card">
        <h3>Голосование</h3>
        <div id="voteInfo" class="muted">Сейчас голосования нет.</div>
        <div id="voteControls" class="hidden">
          <button onclick="sendVote('spy')">Шпион</button>
          <button class="secondary" onclick="sendVote('not_spy')">Не шпион</button>
          <button class="secondary" onclick="sendVote('abstain')">Воздержаться</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
