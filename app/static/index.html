<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Музыкальный шпион</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="page">
    <div id="authScreen" class="screen auth-screen">
      <div class="card auth-card">
        <h1>Музыкальный шпион</h1>

        <label class="field">
          <span>Ник</span>
          <input id="nameInput" type="text" placeholder="Ник" />
        </label>

        <div class="actions vertical">
          <button id="createRoomBtn" class="primary">Создать комнату</button>
        </div>

        <div class="separator"></div>

        <label class="field">
          <span>Код комнаты</span>
          <input id="roomCodeInput" type="text" placeholder="Код комнаты" />
        </label>

        <div class="actions vertical">
          <button id="joinRoomBtn" class="secondary">Войти</button>
        </div>

        <div id="createdRoomBox" class="created-room hidden">
          <div class="muted">Код комнаты</div>
          <div id="createdRoomCode" class="room-code"></div>
        </div>

        <div id="authMessage" class="message"></div>
      </div>
    </div>

    <div id="gameScreen" class="screen hidden">
      <div id="appShell"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
